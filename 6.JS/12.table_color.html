<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3x3 Table</title>

    <style>
        table {
            border-collapse: collapse;
            margin-bottom: 10px;
        }

        td {
            width: 80px;
            height: 80px;
            border: 1px solid black;
            text-align: center;
            font-size: 20px;
        }

        button {
            margin-right: 10px;
            padding: 8px 12px;
        }
    </style>
</head>
<body>

    <table>
        <tr>
            <td>셀1</td>
            <td>셀2</td>
            <td>셀3</td>
        </tr>
        <tr>
            <td>셀4</td>
            <td>셀5</td>
            <td>셀6</td>
        </tr>
        <tr>
            <td>셀7</td>
            <td>셀8</td>
            <td>셀9</td>
        </tr>
    </table>

    <button onclick="changeColor('odd')">홀수셀 색상 변경</button>
    <button onclick="changeColor('even')">짝수셀 색상 변경</button>

    <script>
        function changeColor(type) {
            const cells = document.querySelectorAll("td");

            for (let i = 0; i < cells.length; i++) {
                ((i + 1) % 2 === 1 && type === 'odd') ||
                ((i + 1) % 2 === 0 && type === 'even')
                    ? cells[i].style.backgroundColor = "yellow"
                    : "";
            }
        }
    </script>

</body>
</html>
