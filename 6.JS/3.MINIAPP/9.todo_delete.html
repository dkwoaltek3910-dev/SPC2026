<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .done {
            text-decoration: line-through;
        }
        #todo-list li {
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>오늘 할일(todo 리스트)</h1>
    <input type="text" id="new-todo" placeholder="할일 입력">
    <button id="add-todo">추가</button>
    <ul id="todo-list"><!--할일들이 표시될 곳--></ul>
    <script>
        //버튼이 클릭되면
        //거기 값 읽어와서 ul아래 li추가하기
        document.getElementById('add-todo').addEventListener('click', ()=> {
            const newTodo = document.getElementById('new-todo').value;

            if(newTodo.trim() == '') return; //입력칸이 빈칸이면 종료

            const new_li = document.createElement('li');
            new_li.innerHTML = `${newTodo} <button class = "deleteBtn">삭제</button>`;

            //클링 이벤트를 나의 li에도 걸기
            new_li.addEventListener('click', () => {
                if (new_li.classList.contains('done')) {
                    new_li.classList.remove('done');
                } else {
                    new_li.classList.add('done');
                }
                // new_li.classList.toggle('done');
            })

            //삭제버튼 추가
            const deleteBtn = new_li.querySelector('.deleteBtn');
            deleteBtn.addEventListener('click',() => {
                new_li.remove();
            })

            const todoList = document.getElementById('todo-list');
            todoList.appendChild(new_li);

            //입력창 클리어하기
            document.getElementById('new-todo').value = '';
        });

        //enter를 통한 추가 기능 개선 + 클릭하기 추가
        document.getElementById('new-todo').addEventListener('keydown', (ev) => {
            if (ev.key === 'Enter') {
                document.getElementById('add-todo').click();
            }
        })
    </script>

</body>
</html>
