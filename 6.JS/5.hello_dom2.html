<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>document</title>

    <style>
        /* CSS */
    </style>
</head>

<body>
    <h1>나의 헤딩</h1>
    <p>여기는 나의 문장이 있는곳</p>

    <div id="output"><!--여기가 동적으로 콘텐츠를 채울곳--></div>

    <p class="text">여기는 나의 두번째 문장이 있는곳</p>

    <button onclick="sayhello()">id 변경</button>
    <button onclick="sayhello2()">tag 변경</button>
    <button onclick="sayhello4()">class 변경</button>

    <script>
        //JS
        function sayhello() {
            console.log("sayhello");
            const myoutput = document.getElementById('output');
            console.log(myoutput);
            myoutput.textContent = '나의 새로운 동적 문장';
        }

        function sayhello2() {
            console.log("sayhello2");
            const myoutput = document.getElementsByTagName('div');
            console.log(myoutput[0]);
            myoutput[0].textContent = '태그로 변경한 문장';
        }

        function sayhello3() {
            console.log("sayhello3");
            const myoutput = document.getElementsByTagName('p');
            console.log(myoutput[0]);
            console.log(myoutput[1]);
            myoutput[0].textContent = '첫 번째 p 변경';
        }

        function sayhello4() {
            console.log("sayhello4");
            const myoutput = document.getElementsByClassName('text');
            console.log(myoutput);
            console.log(myoutput[0]);
            myoutput[0].textContent = '클래스로 변경한 문장';
        }
    </script>
</body>

</html>
