<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width">
        <title>내 타이틀</title>
        <style>
            /*CSS*/
        </style>
        <body>
            <h1>나의 헤딩</h1>
            <p>여기는 나의 문장이 있는곳</p>
            <div id="output"><!--여기가 동적으로 칸텐츠를 채울곳--></div>
            <p>여기는 나의 두번쩨 문장이 있는곳</p>
            <button oneclick="sayhello()">여기는 나의 버튼</button>
            <script>
                //JS
                function sayhello() {
                    console.log('hello');
                    const myoutput = document.getElementById('output');
                    console.log(myoutput);
                    myoutput.textContent('글자써보기');
                }
                sayhello();
            </script>
        </body>

    </head>
</html>
