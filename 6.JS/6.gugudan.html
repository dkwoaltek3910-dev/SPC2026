<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>구구단 출력기</title>
</head>

<body>
    <h1>구구단 출력기</h1>

    <input type="text" placeholder="단을 입력하시오 (예:2)" id="input">
    <button onclick="printGugudan()">출력하기</button>

    <div id="result">
        <!-- 결과가 출력될 곳 -->
    </div>

    <script>
        function printGugudan() {
            // 입력값 가져오기
            const userInput = document.getElementById('input');
            const userInputValue = userInput.value;

            console.log(userInputValue);

            // 문자열 → 숫자 변환
            const userInputValueNumber = Number(userInputValue);

            // 결과 출력 영역 가져오기
            const result = document.getElementById('result');
            console.log(result);

            // 숫자가 아니거나 빈칸이면 경고
            if (isNaN(userInputValueNumber) || userInputValue === '') {
                result.innerHTML = '<h3>숫자를 입력하세요.</h3>';
                return;
            }

            // 제목 출력
            result.innerHTML = '<h3>' + userInputValueNumber + '단</h3>';

            // 구구단 출력
            for (let i = 1; i <= 9; i++) {
                result.innerHTML +=
                    userInputValueNumber + ' x ' + i + ' = ' +
                    (userInputValueNumber * i) + '<br>';
            }
        }
    </script>
</body>

</html>
