<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        canvas {
            border: 1px solid #000;
        }
    </style>
</head>
<body>
    <canvas id= "myCanvas"  width="400" height="300"></canvas>
    <script>
        const canvas = document.getElementById('myCanvas');
        const context = canvas.getContext('2d');

        context.fillStyle = '#FF0000'; //빨강
        context.fillRect(50,50,200,100); //x,y,width,height
        context.fillStyle = '#0000FF';//파랑
        context.fillRect(50,150,200,100);

        //라인그리기
        context.strokeStyle = '#00FF00';
        context.lineWidth =5;
        context.beginPath();
        context.moveTo(150,50);
        context.lineTo(250,150);
        context.lineTo(150,250);
        context.lineTo(50,150);
        context.lineTo(150,50);
        context.stroke();
        context.closePath();

        //원그리기
        context.fillStyle = '#FFFF00';
        context.beginPath();
        context.arc(350,50,30,0,2*Math.PI) //x,y,반지름,출발각도,끝각도
        context.fill();
        context.closePath();

        context.fillStyle = '#000000';
        context.beginPath();
        context.arc(350,150,30,1/2*Math.PI,3/2*Math.PI); //x,y,반지름,출발각도,끝각도
        context.fill();
        context.closePath();

        //0 라디언은 오른쪽에서 출발하고
        //1/2파이 라디언은 90도
        //파이 라디언은 180도
        //3/2 파이 라디언은 270도
        //2파이 라디언은 360도
    </script>
</body>
</html>
