<html>
    <head>
        <title>포토 캘린더</title>
        <style>
            h1,h2{
                text-align: center;
            }
            #calendar{
                width: 100%;
                border-collapse: collapse;

            }
            #calendar th {
                width: 14%;
                padding: 10px;
                background-color: #dadada;
            }
             #calendar td {
                text-align: center;
                padding: 10px;
                border: 1px solid black;
            }
            /*calendar id를 가지고 그 아래에 있는*/
            #calendar th:first-child {
                color: red;
            }
             #calendar td:first-child {
                color: red;
            }
            #calendar th:last-child {
                color: blue;
            }
            #calendar th:last-child {
                color: blue;
            }
            img {
                width: 100%;
            }
        </style>
    </head>
    <body>
        <h1>포토 캘린더</h1>
        <h2>2026년 4월</h2>
        <img src="images/사진1.jpeg" width="50%">

</html>
